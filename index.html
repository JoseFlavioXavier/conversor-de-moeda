<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-card">
        <h2>Conversor de Moedas</h2>
        <p class="subtitle">Insira os valores para converter</p>

        <div class="form-group">
            <label for="amount-input">Valor a converter</label>
            <input type="text" id="amount-input" placeholder="0.00" min="0" step="0.01">
        </div>

        <div class="form-group">
            <label for="direction-select">Direção da Conversão</label>
            <select id="direction-select">
                <option value="BRL-USD">Real (R$) para Dólar ($)</option>
                <option value="USD-BRL">Dólar ($) para Real (R$)</option>
            </select>
        </div>

        <div class="exchange-rate-info">
            <span>Cotação atualizada:</span>
            <strong id="rate-display">Aguardando API...</strong>
        </div>

        <button id="convert-btn">Converter Valores</button>

        <div class="result-box">
            <span class="result-label">Resultado Calculado</span>
            <div id="result-value">--</div>
        </div>
    </div>

    <script>
    </script>
</body>
</html>
